# Denne fila er "roboten". GitHub kjører den automatisk etter tidsplanen under,
# og du kan også starte den manuelt med ett klikk (fanen "Actions" på GitHub).

name: Daglig oppdatering

on:
  schedule:
    # Tidspunktet er i UTC (verdenstid), IKKE norsk tid.
    #   Om VINTEREN (nov–mar) er norsk tid = UTC + 1  ->  17:00 UTC = 18:00 norsk.
    #   Om SOMMEREN (mar–okt) er norsk tid = UTC + 2  ->  17:00 UTC = 19:00 norsk.
    # "1-5" betyr mandag–fredag (hverdager). Vil du ha et annet klokkeslett,
    # endre bare tallene: "minutt time * * ukedager".
    - cron: "0 17 * * 1-5"
  workflow_dispatch: {}   # gjør at du kan kjøre roboten manuelt med ett klikk

# Gir roboten lov til å lagre (committe) oppdaterte datafiler tilbake til repoet.
permissions:
  contents: write

jobs:
  oppdater:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer biblioteker
        run: pip install -r requirements.txt

      - name: Kjør daglig oppdatering (henting + screening + e-post)
        env:
          EPOST_AVSENDER: ${{ secrets.EPOST_AVSENDER }}
          EPOST_PASSORD: ${{ secrets.EPOST_PASSORD }}
          EPOST_MOTTAKER: ${{ secrets.EPOST_MOTTAKER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python oppdater.py

      - name: Lagre oppdaterte data tilbake til GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Daglig oppdatering av kursdata og liste" || echo "Ingen endringer å lagre"
          git push
