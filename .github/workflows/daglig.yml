# Denne fila er "roboten". GitHub kjører den automatisk etter tidsplanen under,
# og du kan også starte den manuelt med ett klikk (fanen "Actions" på GitHub).

name: Daglig oppdatering

on:
  schedule:
    # GitHub kjører ALLTID etter verdenstid (UTC), som IKKE følger norsk
    # sommer-/vintertid. For å treffe kl. 19:00 norsk HELE året legger vi inn
    # to tidspunkt – ett for sommeren og ett for vinteren – og "vakt"-jobben
    # under sørger for at selve oppdateringen bare kjører når klokka faktisk
    # er 19 i Norge. "1-5" betyr mandag–fredag (hverdager).
    - cron: "0 17 * * 1-5"   # = 19:00 norsk om SOMMEREN (UTC + 2)
    - cron: "0 18 * * 1-5"   # = 19:00 norsk om VINTEREN (UTC + 1)
  workflow_dispatch: {}   # gjør at du kan kjøre roboten manuelt med ett klikk

# Gir roboten lov til å lagre (committe) oppdaterte datafiler tilbake til repoet.
permissions:
  contents: write

jobs:
  # Vakt: sjekker hva klokka er i Norge og bestemmer om oppdateringen skal kjøre.
  # (Trengs fordi vi har to cron-tidspunkt – ett for sommer og ett for vinter.)
  vakt:
    runs-on: ubuntu-latest
    outputs:
      kjor: ${{ steps.klokke.outputs.kjor }}
    steps:
      - name: Sjekk norsk klokkeslett
        id: klokke
        run: |
          norsk_time=$(TZ="Europe/Oslo" date +%H)
          echo "Klokka i Norge er nå $norsk_time."
          if [ "$norsk_time" = "19" ]; then
            echo "kjor=ja" >> "$GITHUB_OUTPUT"
          else
            echo "kjor=nei" >> "$GITHUB_OUTPUT"
            echo "Dette er 'ekstra'-kjøringen for den andre årstiden – hopper over."
          fi

  oppdater:
    needs: vakt
    # Kjør bare hvis vakta sier det er kl. 19 i Norge – ELLER hvis du starter manuelt.
    if: needs.vakt.outputs.kjor == 'ja' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer biblioteker
        run: pip install -r requirements.txt

      - name: Kjør daglig oppdatering (henting + screening + e-post)
        env:
          EPOST_AVSENDER: ${{ secrets.EPOST_AVSENDER }}
          EPOST_PASSORD: ${{ secrets.EPOST_PASSORD }}
          EPOST_MOTTAKER: ${{ secrets.EPOST_MOTTAKER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python oppdater.py

      - name: Lagre oppdaterte data tilbake til GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Daglig oppdatering av kursdata og liste" || echo "Ingen endringer å lagre"
          git push
